name: textmining-papi
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pandas>=2.0
  - numpy>=1.24
  - pyarrow>=14
  - matplotlib>=3.7
  - seaborn>=0.13            # heatmap delle analisi
  - py3langid>=0.3           # importato da vdb (repo gemello)
  - jupyter
  - pip
  - pip:
      # I notebook in analisi/ importano vdb dal vector database: servono le sue
      # dipendenze (torch arriva con sentence-transformers).
      - sentence-transformers>=2.2
      - lancedb>=0.24
  # Le librerie specifiche delle prossime analisi (topic modeling, NLP,
  # dashboard) si aggiungono qui man mano che vengono scelte.
